    if (timerRun) {
      timerRef.current = setInterval(() => {
        setTSec(s => {
          if (s <= 1) { clearInterval(timerRef.current); setTRun(false); setTDone(true); playDone(); return 0; }
          return s - 1;
        });
      }, 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [timerRun]);

  // Auto-refresh Focus tab every minute
  useEffect(() => {
    const t = setInterval(() => setTick(n => n+1), 60000);
    return () => clearInterval(t);
  }, []);

    const upd = {...habits, [id]: !habits[id]};

    try {
      localStorage.setItem("h:" + TODAY, JSON.stringify(upd));
      showToast("✓ Habitude enregistrée");
      // Update history
      const dayScore = HABITS_DEF.filter(h => upd[h.id]).length;
      const habitMap = Object.fromEntries(HABITS_DEF.map(h => [h.id, !!upd[h.id]]));
      const newHist = {...history, [TODAY]: {score: dayScore, total: HABITS_DEF.length, core: CORE.every(c => upd[c]), habits: habitMap}};
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-31);
      Object.keys(newHist).forEach(d => { if(new Date(d) < cutoff) delete newHist[d]; });
      setHistory(newHist);
      localStorage.setItem("history", JSON.stringify(newHist));

        const s = localStorage.getItem("streak");

          st.current = st.lastDate === getYest() ? st.current + 1 : 1;
          st.best = Math.max(st.best, st.current);
          st.lastDate = TODAY;
          const dates = new Set(st.completedDates || []);
          dates.add(TODAY);
          st.completedDates = [...dates].slice(-30);
          setStreak(st);
          localStorage.setItem("streak", JSON.stringify(st));
        }
      }
    } catch(e) {}
  };

  const launchTimer = (sec) => {
    clearInterval(timerRef.current); setTRun(false); setTDone(false); setTSec(sec);
    const idx = TIMERS.reduce((bi,t,i) => Math.abs(t.sec-sec) < Math.abs(TIMERS[bi].sec-sec) ? i : bi, 0);

    const updated = {...objectifs, [field]: val};

    try { localStorage.setItem("gym_history", JSON.stringify(newHist)); showToast("✓ Séance sauvegardée"); } catch(e) {}
    const newLast = {...gymLast};
    const newPRs  = {...gymPRs};
    Object.entries(gymSession).forEach(([exId, sets]) => {
      if (sets && sets.length > 0) {
        newLast[exId] = sets;
        const maxW = Math.max(...sets.map(s => parseFloat(s.w)||0));

          newPRs[exId] = { w: maxW, date: TODAY };

      }
    });
    setGymLast(newLast); setGymPRs(newPRs);
    try {
      localStorage.setItem("gym_last", JSON.stringify(newLast));
      localStorage.setItem("gym_prs", JSON.stringify(newPRs));

    setGymSaved(true); setTimeout(() => setGymSaved(false), 2500);
  };

      const sets = [...(prev[exId] || [{w:"",r:""},{w:"",r:""},{w:"",r:""},{w:"",r:""}])];
      sets[setIdx] = {...sets[setIdx], [field]: val};
      return {...prev, [exId]: sets};
    });
  };
  const addSet = (exId) => {
    setGymS(prev => ({...prev, [exId]: [...(prev[exId]||[]), {w:"",r:""}]}));
  };

    setGymS(prev => {
      const sets = prev[exId]||[];
      if (sets.length <= 1) return prev;
      return {...prev, [exId]: sets.slice(0,-1)};
    });

                  </div>
                ))}
              </div>
            )}
            {plusTab === "finances" && (
              <div>
                <p style={{...S.mu,marginBottom:"10px"}}>Les finances : le seul axe ou l'inaction a un cout compose.</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"8px"}}>
                  {FINANCES.pillars.map((p,i) => (
                    <div key={i} style={{background:"#1C1915",border:`1px solid ${p.color}28`,borderTop:`3px solid ${p.color}`,borderRadius:"10px",padding:"10px 11px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px"}}><span style={{fontSize:"18px"}}>{p.icon}</span><span style={{fontSize:"12px",fontWeight:700,color:p.color}}>{p.name}</span></div>
                      <p style={{fontSize:"11px",color:"#9E9485",lineHeight:1.5,margin:0}}>{p.desc}</p>
                    </div>
                  ))}
                </div>
                <div style={S.card}>
                  <div style={{padding:"9px 12px",borderBottom:"1px solid #2E2A25",background:"#1A1E14"}}><p style={{fontSize:"13px",fontWeight:700,color:"#4ADE80",margin:0}}>📅 Habitudes</p></div>
                  {FINANCES.weekly.map((item,i) => (
                    <div key={i} style={{padding:"9px 12px",borderBottom:i<FINANCES.weekly.length-1?"1px solid #2E2A25":"none"}}>
                      <p style={{fontSize:"10px",fontWeight:700,color:"#4ADE80",margin:"0 0 3px",textTransform:"uppercase",letterSpacing:"0.8px"}}>{item.slot}</p>
                      <p style={S.mu}>{item.action}</p>
                    </div>
                  ))}
                </div>
                <div style={S.card}>
                  <div style={{padding:"9px 12px",borderBottom:"1px solid #2E2A25",background:"#1A1E14"}}><p style={{fontSize:"13px",fontWeight:700,color:"#60A5FA",margin:0}}>📋 Regles</p></div>
                  {FINANCES.rules.map((r,i) => (
                    <div key={i} style={{display:"flex",gap:"7px",padding:"8px 12px",borderBottom:i<FINANCES.rules.length-1?"1px solid #2E2A25":"none"}}>
                      <span style={{color:"#60A5FA",flexShrink:0}}>→</span>
                      <p style={{...S.mu,color:"#C8C2B8",margin:0}}>{r}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

      </div>
      <p style={S.ft}>La constance bat l'intensite — chaque jour, pas parfois</p>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
