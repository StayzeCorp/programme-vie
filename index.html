const heatColor = entry => {
  if (!entry) return "#1E1B16";
  const p = entry.score / entry.total;
  if (p >= .8) return "#22C55E";
  if (p >= .6) return "#EAB308";
  if (p >= .3) return "#F97316";
  if (p > 0) return "#EF4444";
  return "#1E1B16";
};
const parseTime = s => {
  if (!s || s === '—' || s === 'Variable') return null;
  const m = s.match(/(\d+)\s*min/);
  if (m) return +m[1] * 60;
  const b = s.match(/(\d+)\s*.\s*(\d+)/);
  if (b) return +b[2] * 60;
  const h = s.match(/(\d+)\s*h/);
  if (h) return +h[1] * 3600;
  return null;
};

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((f, i) => {
      const o = ctx.createOscillator(),
        g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      o.connect(g);
      g.connect(ctx.destination);
      g.gain.setValueAtTime(.3, ctx.currentTime + i * .15);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i * .15 + .8);
      o.start(ctx.currentTime + i * .15);
      o.stop(ctx.currentTime + i * .15 + .8);
    });
  } catch (e) {}
};
